<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Weather App</h1>
    <p class="subtitle">Select a city to view weather information.</p>

    <div class="controls">
      <label for="city-select" class="sr-only">Select a city</label>
      <select id="city-select" class="city-select" aria-label="Select a city">
        <option value="">-- Select a city --</option>
      </select>
    </div>

    <div id="selected-city-display" class="selected-city-display" hidden>
      <article class="city-card selected">
        <div class="city-info">
          <span class="city-name" id="selected-city-name"></span>
          <span class="city-country" id="selected-city-country"></span>
        </div>
        <div class="city-meta">
          <span class="city-population" id="selected-city-population"></span>
          <span class="city-coords" id="selected-city-coords"></span>
        </div>
      </article>
    </div>

    <div class="controls controls-secondary">
      <input
        type="search"
        id="search"
        class="search-input"
        placeholder="Search by city or country…"
        aria-label="Search cities"
      >
      <select id="sort" class="sort-select" aria-label="Sort cities">
        <option value="name">Sort by name</option>
        <option value="country">Sort by country</option>
        <option value="population">Sort by population</option>
      </select>
    </div>

    <div id="weather-panel" class="weather-panel" hidden></div>

    <p id="city-count" class="city-count"></p>
    <div id="city-list" class="city-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
