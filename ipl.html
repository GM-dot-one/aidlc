    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 2px solid #00d4ff;
      padding: 16px 20px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: #00d4ff;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Team List ─────────────────────────── */
    .team-list h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #ffffff;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (min-width: 600px) {
      .team-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 1024px) {
      .team-grid { grid-template-columns: repeat(5, 1fr); }
    }

    .team-card {
      -webkit-appearance: none;
      appearance: none;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      text-align: center;
      background: none;
      font-family: inherit;
      color: inherit;
    }

    .team-card:hover, .team-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.45);
      outline: none;
    }

    .team-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .team-logo-fallback {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
    }

    .team-name-full {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .team-name-short {
      font-size: 0.75rem;
      opacity: 0.75;
    }

    /* ── Team Detail ───────────────────────── */
    .team-header {
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .team-logo-large {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .team-logo-fallback-large {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .team-header h2 {
      font-size: clamp(1.15rem, 3vw, 1.7rem);
      font-weight: 800;
      flex: 1;
      min-width: 120px;
    }

    .back-btn {
      -webkit-appearance: none;
      appearance: none;
      background: none;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 8px 14px;
      border: 2px solid;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.18s;
    }

    .back-btn:hover, .back-btn:focus-visible {
      opacity: 0.72;
      outline: none;
    }

    .matches-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 900px) {
      .matches-container { grid-template-columns: 1fr 1fr; }

      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #2a2a4a;
      color: #ffffff;

      flex-direction: column;

      font-style: italic;

<script>
function getTeam(code) {
  return TEAMS.find(function(t) { return t.code === code; });
}

function textColor(hex) {
  var r = parseInt(hex.slice(1,3), 16) / 255;
  var g = parseInt(hex.slice(3,5), 16) / 255;
  var b = parseInt(hex.slice(5,7), 16) / 255;
  return (0.299*r + 0.587*g + 0.114*b) > 0.5 ? '#000000' : '#ffffff';
}

function fmtDate(s) {
  var parts = s.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parts[2] + ' ' + months[parseInt(parts[1],10) - 1] + ' ' + parts[0];
}

function fmtTime(t) {
  var parts = t.split(':');
  var h = parseInt(parts[0], 10);
  var m = parts[1];
  var period = h >= 12 ? 'PM' : 'AM';
  var h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return h12 + ':' + m + ' ' + period + ' IST';
}

function todayStr() {
  var d = new Date();
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

// ── Router ────────────────────────────────────────────
function route() {
  var m = location.hash.match(/^#team=([A-Z]+)$/);
  if (m) renderTeamDetailView(m[1]);
  else renderTeamListView();
}

window.addEventListener('DOMContentLoaded', route);
window.addEventListener('hashchange', route);

// ── Team List View ─────────────────────────────────────
function renderTeamListView() {
  var cards = TEAMS.map(function(team) {
    var fg = textColor(team.primaryColor);
    var sfg = textColor(team.secondaryColor);
    return '<button class="team-card"' +
      ' style="background-color:' + team.primaryColor + ';color:' + fg + ';border-color:' + team.secondaryColor + '"' +
      ' onclick="location.hash=\'#team=' + team.code + '\'"' +
      ' aria-label="View ' + team.fullName + ' schedule">' +
      '<img src="' + team.logoUrl + '" alt="' + team.shortName + ' logo" class="team-logo"' +
      ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div class="team-logo-fallback"' +
      ' style="background:' + team.secondaryColor + ';color:' + sfg + ';display:none">' +
      team.shortName + '</div>' +
      '<div class="team-name-full">' + team.fullName + '</div>' +
      '<div class="team-name-short">' + team.shortName + '</div>' +
      '</button>';
  }).join('');

  document.getElementById('root').innerHTML =
    '<section class="team-list">' +
    '<h2>IPL 2026 Teams</h2>' +
    '<div class="team-grid">' + cards + '</div>' +
    '</section>';
}

// ── Team Detail View ───────────────────────────────────
function renderTeamDetailView(code) {
  var team = getTeam(code);
  if (!team) { history.replaceState(null, '', location.pathname + location.search); renderTeamListView(); return; }

  var today = todayStr();
  var teamMatches = MATCHES.filter(function(m) {
    return m.team1Code === code || m.team2Code === code;
  });

  var past = teamMatches
    .filter(function(m) { return m.date < today; })
    .sort(function(a, b) { return b.date.localeCompare(a.date); });

  var upcoming = teamMatches
    .filter(function(m) { return m.date >= today; })
    .sort(function(a, b) { return a.date.localeCompare(b.date); });

  var fg = textColor(team.primaryColor);
  var sfg = textColor(team.secondaryColor);

  var pastHtml = past.length
    ? past.map(function(m) { return renderPastMatch(m, code); }).join('')
    : '<p class="empty-state">No completed matches yet.</p>';

  var upcomingHtml = upcoming.length
    ? upcoming.map(function(m) { return renderUpcomingMatch(m, code); }).join('')
    : '<p class="empty-state">No upcoming matches scheduled.</p>';

  document.getElementById('root').innerHTML =
    '<section class="team-detail">' +
    '<div class="team-header" style="background-color:' + team.primaryColor + ';color:' + fg + '">' +
    '<img src="' + team.logoUrl + '" alt="' + team.shortName + ' logo" class="team-logo-large"' +
    ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
    '<div class="team-logo-fallback-large"' +
    ' style="background:' + team.secondaryColor + ';color:' + sfg + ';display:none">' +
    team.shortName + '</div>' +
    '<h2>' + team.fullName + '</h2>' +
    '<button class="back-btn" onclick="location.hash=\'\'"' +
    ' style="color:' + fg + ';border-color:' + fg + '">' +
    '← Back to All Teams</button>' +
    '</div>' +
    '<div class="matches-container">' +
    '<div class="matches-section"><h3>Past Matches</h3><div class="match-list">' + pastHtml + '</div></div>' +
    '<div class="matches-section"><h3>Upcoming Matches</h3><div class="match-list">' + upcomingHtml + '</div></div>' +
    '</div>' +
    '</section>';
}

function resultBadge(m, code) {
  if (m.winnerCode === null) return '<span class="badge badge-nr">NR</span>';
  if (m.winnerCode === code)  return '<span class="badge badge-win">Win</span>';
  return '<span class="badge badge-loss">Loss</span>';
}

function renderPastMatch(m, code) {
  var oppCode = m.team1Code === code ? m.team2Code : m.team1Code;
  var opp = getTeam(oppCode);
  var badge = resultBadge(m, code);
  var score = (m.margin && m.margin !== 'No Result')
    ? '<span class="match-score">by ' + m.margin + '</span>'
    : '';
  return '<div class="match-card">' +
    '<div class="match-opponent">' +
    '<img src="' + opp.logoUrl + '" alt="' + opp.shortName + '" class="opp-logo"' +
    ' onerror="this.style.display=\'none\'">' +
    '<span>vs ' + opp.fullName + '</span></div>' +
    '<div class="match-info">' +
    '<span class="match-date">' + fmtDate(m.date) + '</span>' +
    '<span class="match-venue">' + m.venue + '</span>' +
    '</div>' +
    '<div class="match-result">' + badge + score + '</div>' +
    '</div>';
}

function renderUpcomingMatch(m, code) {
  var oppCode = m.team1Code === code ? m.team2Code : m.team1Code;
  var opp = getTeam(oppCode);
  return '<div class="match-card">' +
    '<div class="match-opponent">' +
    '<img src="' + opp.logoUrl + '" alt="' + opp.shortName + '" class="opp-logo"' +
    ' onerror="this.style.display=\'none\'">' +
    '<span>vs ' + opp.fullName + '</span></div>' +
    '<div class="match-info">' +
    '<span class="match-date">' + fmtDate(m.date) + '</span>' +
    '<span class="match-time">' + fmtTime(m.timeIST) + '</span>' +
    '<span class="match-venue">' + m.venue + '</span>' +
    '</div>' +
    '</div>';
}
</script>
</body>
</html>
