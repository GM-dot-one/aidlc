<html lang="en">
<head>

<title>IPL 2024 Schedule</title>
<style>
  /* Reset */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* Base */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: #1a1a2e;
    color: #ffffff;
    padding: 20px 24px;
    text-align: center;
  }
  header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: 0.5px; }
  header p { font-size: 0.875rem; color: #a0aec0; margin-top: 4px; }

  /* Main container */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }

  /* Team Grid */
  #team-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }

  /* Team Card */
  .team-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px 16px;
    background: #ffffff;
    border-radius: 12px;
    text-decoration: none;
    color: #1a1a1a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .team-card:hover, .team-card:focus {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    outline: none;
  }
  .team-card:focus-visible { outline: 3px solid #4299e1; outline-offset: 2px; }

  /* Team monogram circle */
  .team-badge {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 800;
    flex-shrink: 0;
  }
  .team-name { font-size: 0.9rem; font-weight: 600; text-align: center; }

  /* Detail view */
  #team-detail { display: none; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #4299e1;
    text-decoration: none;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .back-link:hover { text-decoration: underline; }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .detail-header .team-badge { width: 80px; height: 80px; font-size: 1.75rem; }
  .detail-header h1 { font-size: 1.75rem; font-weight: 700; }

  /* Match sections */
  .match-section { margin-bottom: 40px; }
  .match-section h2 {
    font-size: 1.2rem;
    font-weight: 700;
    border-bottom: 3px solid #e2e8f0;
    padding-bottom: 8px;
    margin-bottom: 16px;
  }

  .empty-state {
    background: #ffffff;
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    color: #718096;
    font-size: 0.9rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  /* Match cards */
  .match-list { display: flex; flex-direction: column; gap: 10px; }

  .match-card {
    background: #ffffff;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
  }

  .match-teams { font-weight: 600; font-size: 0.95rem; }
  .match-meta { font-size: 0.82rem; color: #718096; margin-top: 3px; }
  .match-venue { font-size: 0.82rem; color: #718096; }

  .match-result {
    text-align: right;
    font-size: 0.82rem;
    font-weight: 600;
  }
  .result-win { color: #2f855a; }
  .result-loss { color: #c53030; }
  .result-nr { color: #718096; }

  .match-time { font-size: 0.9rem; font-weight: 600; color: #4299e1; }

  /* Responsive */
  @media (max-width: 600px) {
    #team-list { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 1.35rem; }
    .detail-header h1 { font-size: 1.3rem; }
    .match-card { grid-template-columns: 1fr; }
    .match-result { text-align: left; margin-top: 6px; }
  }

  @media (max-width: 375px) {
    #team-list { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .team-card { padding: 16px 8px; }
    .team-badge { width: 60px; height: 60px; font-size: 1.25rem; }
    main { padding: 20px 10px; }
  }
</style>
</head>

// ---------------------------------------------------------------------------
// HELPERS
// ---------------------------------------------------------------------------
function teamById(id) {
  return TEAMS.find(t => t.id === id);
}

function fmtDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${String(d).padStart(2,'0')} ${months[m-1]} ${y}`;
}

// Returns the opposing team id given a match and the viewing team.
function opponent(match, teamId) {
  return match.team1 === teamId ? match.team2 : match.team1;
}

// ---------------------------------------------------------------------------
// RENDER: TEAM LIST
// ---------------------------------------------------------------------------
function renderTeamList() {
  document.title = 'IPL 2024 Schedule';
  const container = document.getElementById('team-list');
  const detail = document.getElementById('team-detail');
  detail.style.display = 'none';
  container.style.display = 'grid';

  container.innerHTML = TEAMS.map(t => `
    <a href="#team/${t.id}" class="team-card" role="listitem" aria-label="${t.name}">
      <span class="team-badge" style="background:${t.color};color:${t.textColor}" aria-hidden="true">${t.abbr}</span>
      <span class="team-name">${t.name}</span>
    </a>
  `).join('');
}

// ---------------------------------------------------------------------------
// RENDER: TEAM DETAIL
// ---------------------------------------------------------------------------
function renderTeamDetail(teamId) {
  const team = teamById(teamId);
  if (!team) {
    renderTeamList();
    return;
  }

  document.title = `${team.name} — IPL 2024 Schedule`;

  const container = document.getElementById('team-list');
  const detail = document.getElementById('team-detail');
  container.style.display = 'none';
  detail.style.display = 'block';

  // Filter matches
  const teamMatches = MATCHES.filter(m => m.team1 === teamId || m.team2 === teamId);
  const past = teamMatches
    .filter(m => m.status === 'completed')
    .sort((a, b) => b.date.localeCompare(a.date));
  const upcoming = teamMatches
    .filter(m => m.status === 'upcoming')
    .sort((a, b) => a.date.localeCompare(b.date));

  // Past match cards
  let pastHTML;
  if (past.length === 0) {
    pastHTML = `<div class="empty-state">No completed matches yet.</div>`;
  } else {
    pastHTML = `<div class="match-list">${past.map(m => {
      const opp = teamById(opponent(m, teamId));
      const won = m.winner === teamId;
      const noResult = m.winner === 'NR';
      const resultClass = noResult ? 'result-nr' : won ? 'result-win' : 'result-loss';
      const resultLabel = noResult ? 'No Result' : won ? `Won by ${m.margin}` : `Lost by ${m.margin}`;
      // Which score belongs to which team
      const myScore = m.team1 === teamId ? m.score1 : m.score2;
      const oppScore = m.team1 === teamId ? m.score2 : m.score1;
      return `
        <div class="match-card">
          <div>
            <div class="match-teams">${team.abbr} vs ${opp.abbr}</div>
            <div class="match-meta">${fmtDate(m.date)}</div>
            <div class="match-venue">${m.venue}</div>
            <div class="match-meta" style="margin-top:4px">${team.abbr}: ${myScore} | ${opp.abbr}: ${oppScore}</div>
          </div>
          <div class="match-result ${resultClass}">${resultLabel}</div>
        </div>`;
    }).join('')}</div>`;
  }

  // Upcoming match cards
  let upcomingHTML;
  if (upcoming.length === 0) {
    upcomingHTML = `<div class="empty-state">No upcoming matches scheduled.</div>`;
  } else {
    upcomingHTML = `<div class="match-list">${upcoming.map(m => {
      const opp = teamById(opponent(m, teamId));
      return `
        <div class="match-card">
          <div>
            <div class="match-teams">${team.abbr} vs ${opp.abbr}</div>
            <div class="match-meta">${fmtDate(m.date)}</div>
            <div class="match-venue">${m.venue}</div>
          </div>
          <div class="match-time">${m.time || ''} IST</div>
        </div>`;
    }).join('')}</div>`;
  }

  detail.innerHTML = `
    <a href="#" class="back-link" aria-label="Back to all teams">← All Teams</a>
    <div class="detail-header">
      <span class="team-badge" style="background:${team.color};color:${team.textColor}" aria-hidden="true">${team.abbr}</span>
      <h1>${team.name}</h1>
    </div>
    <section class="match-section">
      <h2>Past Matches (${past.length})</h2>
      ${pastHTML}
    </section>
    <section class="match-section">
      <h2>Upcoming Matches</h2>
      ${upcomingHTML}
    </section>
  `;
}

// ---------------------------------------------------------------------------
// ROUTER
// ---------------------------------------------------------------------------
function route() {
  const hash = window.location.hash;
  const teamMatch = hash.match(/^#team\/([A-Z]+)$/);
  if (teamMatch) {
    renderTeamDetail(teamMatch[1]);
  } else {
    renderTeamList();
  }
}

document.addEventListener('DOMContentLoaded', route);
window.addEventListener('hashchange', route);
</script>
